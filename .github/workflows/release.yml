name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version. Stable: x.y.z (e.g. 0.4.4, 0.5.0, 1.0.0). Prerelease: x.y.z-<id>.<n>, counter >= 1 (e.g. 0.5.0-beta.1, 1.0.0-rc.2).'
        required: true
        type: string
      dry_run:
        description: 'Validate the release flow without publishing, merging, tagging, or creating a GitHub Release.'
        required: false
        default: false
        type: boolean

permissions: read-all

# One release per version at a time. cancel-in-progress is false so a second
# dispatch of the same version queues rather than aborting an in-flight publish.
concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # PREPARE — runs on the maintainer's workflow_dispatch. Validates the
  # version, confirms main is CI-green, and then:
  #   • stable:     lands the version bump on main via an auto-approved PR
  #                 (which is what the publish-stable job later publishes and
  #                 merges). The auto-approved PR is also the reviewed
  #                 changeset the Scorecard Code-Review check counts.
  #   • prerelease: publishes immediately (no approval gate), exactly as before
  #                 — the bump lives only on a tag-only commit; main is untouched.
  # ────────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write # prerelease publishes from this job via npm Trusted Publishing
    outputs:
      is_prerelease: ${{ steps.detect.outputs.is_prerelease }}
      dist_tag: ${{ steps.detect.outputs.dist_tag }}
      branch: ${{ steps.bump.outputs.branch }}
      head_sha: ${{ steps.bump.outputs.head_sha }}
      pr_number: ${{ steps.bump.outputs.pr_number }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Validate version input and detect release type
        id: detect
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Auto-detect stable vs prerelease from the version format.
          # Both paths live in this single workflow because npm Trusted
          # Publishing authorizes exactly one workflow filename per package.
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if echo "$INPUT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            IS_PRERELEASE=false
            BASE_VERSION="$INPUT_VERSION"
            DIST_TAG=""
          elif echo "$INPUT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z][a-zA-Z0-9]*\.[1-9][0-9]*$'; then
            # Project convention: x.y.z-<id>.<n>. Narrower than full semver on
            # purpose — <id> is used directly as the npm dist-tag, and <n>
            # must start at 1 (so `.0` is rejected to avoid publishing
            # `@beta.0` when the first beta was intended to be `@beta.1`).
            IS_PRERELEASE=true
            BASE_VERSION="${INPUT_VERSION%%-*}"
            DIST_TAG=$(echo "$INPUT_VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-([a-zA-Z][a-zA-Z0-9]*)\.[1-9][0-9]*$/\1/')
          else
            echo "::error::Invalid version format: '$INPUT_VERSION'. Must be x.y.z (stable) or x.y.z-<id>.<n> with <n> >= 1."
            exit 1
          fi

          if [ "$INPUT_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::error::Version $INPUT_VERSION is the same as the current package.json version"
            exit 1
          fi

          # Base must be strictly greater than the current stable's base.
          # CURRENT_VERSION is stripped of any prerelease suffix as a no-op
          # in the normal flow (main only holds stable versions) and as a
          # safety net if package.json was manually edited.
          CURRENT_BASE="${CURRENT_VERSION%%-*}"
          IS_GREATER=$(node -e "
            const [aMaj, aMin, aPat] = process.argv[1].split('.').map(Number);
            const [bMaj, bMin, bPat] = process.argv[2].split('.').map(Number);
            const gt = aMaj > bMaj || (aMaj === bMaj && aMin > bMin) || (aMaj === bMaj && aMin === bMin && aPat > bPat);
            console.log(gt ? 'yes' : 'no');
          " "$BASE_VERSION" "$CURRENT_BASE")
          if [ "$IS_GREATER" != "yes" ]; then
            echo "::error::Release base $BASE_VERSION must be strictly greater than current stable $CURRENT_BASE"
            exit 1
          fi

          # The remote ref is the authoritative duplicate-release guard for
          # both stable and prerelease tags.
          if git ls-remote --exit-code --tags origin "refs/tags/v$INPUT_VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$INPUT_VERSION already exists on the remote"
            exit 1
          fi

          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      # Verifies the release starts from a known-good main commit. Must run
      # after checkout and before any local commit (the version bump below).
      - uses: ./.github/release-actions/wait-for-ci

      # ── STABLE: land the bump on main via an auto-approved PR ──────────────
      # The branch is pushed and the PR opened with RELEASE_PAT (a real PAT),
      # not GITHUB_TOKEN, so both CI and the auto-approve workflow fire on it.
      # The auto-approval makes this a reviewed changeset (Scorecard Code-Review)
      # and lets the publish-stable job merge it after npm succeeds. Publishing
      # is NOT triggered by this approval — the publish-stable job's `release`
      # environment gate is the human control.
      - name: Open auto-approved version-bump PR (stable)
        id: bump
        if: steps.detect.outputs.is_prerelease == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          INPUT_VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            BRANCH="release-test/v$INPUT_VERSION"
            TITLE="test: release v$INPUT_VERSION"
            BODY=$(printf '## Dry-run stable-release validation for v%s\n\n**Do not merge.** This PR exists only so the Release workflow can validate build, signing, and an npm publish dry-run after the `release` deployment is approved. The workflow closes it automatically.' "$INPUT_VERSION")
          else
            BRANCH="release/v$INPUT_VERSION"
            TITLE="chore: release v$INPUT_VERSION"
            BODY=$(printf '## ⚠️ DO NOT MERGE MANUALLY\n\nThe **Release** workflow merges this PR itself, and only **after** npm publishing succeeds.\n\nTo publish v%s: open the running **Release** workflow and approve the pending **release** deployment ("Review deployments"). Merging or closing this PR by hand will not publish anything and will leave the release half-done.' "$INPUT_VERSION")
          fi

          # A leftover branch/PR from a previous dry-run of the same version is
          # disposable — close its PR and delete the branch before recreating so
          # we don't race a stale open PR. A real release branch that already
          # exists is an error.
          if git ls-remote --exit-code --heads origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry-run branch $BRANCH already exists; closing its PR and deleting the branch before recreating."
              if ! gh pr close "$BRANCH" --delete-branch; then
                echo "No open PR found for $BRANCH (or close failed); deleting the branch directly."
                git push origin --delete "$BRANCH"
              fi
            else
              echo "::error::Release branch $BRANCH already exists"
              exit 1
            fi
          fi

          node .github/scripts/update-version-refs.cjs "$INPUT_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch --create "$BRANCH"
          git add package.json package-lock.json docs/getting-started.md .github/workflows/release.yml
          git commit -m "chore: release v$INPUT_VERSION"
          git push --set-upstream origin "$BRANCH"

          HEAD_SHA=$(git rev-parse HEAD)
          PR_URL=$(gh api --method POST "repos/$GITHUB_REPOSITORY/pulls" \
            -f title="$TITLE" \
            -f head="$BRANCH" \
            -f base=main \
            -f body="$BODY" \
            --jq .html_url)
          echo "Opened $PR_URL"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_URL##*/}" >> "$GITHUB_OUTPUT"

      # Block until the bump PR's required checks are green, so the human is
      # only ever asked to approve a validated release. A hard check failure
      # fails the release here, before the approval gate is reached.
      - name: Wait for the bump PR's required checks (stable)
        if: steps.detect.outputs.is_prerelease == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.bump.outputs.pr_number }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            STATES=$(gh pr checks "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --required --json state --jq '[.[] | .state] | join(",")' 2>/dev/null || echo "")
            if echo "$STATES" | grep -qE 'FAILURE|CANCELLED|TIMED_OUT|ERROR|STARTUP_FAILURE|ACTION_REQUIRED'; then
              echo "::error::A required check failed on bump PR #$PR_NUMBER (states: $STATES). Refusing to release."
              exit 1
            fi
            if [ -n "$STATES" ] && ! echo "$STATES" | grep -qvE '^(SUCCESS|SKIPPED)(,(SUCCESS|SKIPPED))*$'; then
              echo "All required checks passed on bump PR #$PR_NUMBER."
              exit 0
            fi
            echo "Waiting for required checks on #$PR_NUMBER (states: ${STATES:-none registered yet})..."
            sleep 20
          done
          echo "::error::Timed out waiting for required checks on bump PR #$PR_NUMBER."
          exit 1

      # ── PRERELEASE: publish immediately, un-gated (unchanged behaviour) ────
      - name: Bump version in runner only (prerelease)
        if: steps.detect.outputs.is_prerelease == 'true'
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: node .github/scripts/update-version-refs.cjs "$INPUT_VERSION" --prerelease

      - name: Create throwaway commit and push tag only (prerelease)
        if: steps.detect.outputs.is_prerelease == 'true' && inputs.dry_run != true
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: prerelease v$INPUT_VERSION"
          git tag "v$INPUT_VERSION"
          # Push the tag only — main is not modified. `--atomic` makes the tag
          # creation fail server-side if the ref already exists (e.g. a
          # concurrent dispatch tagged the same version) rather than diverging.
          git push --atomic origin "v$INPUT_VERSION"

      - name: Build, pack, and sign prerelease
        if: steps.detect.outputs.is_prerelease == 'true'
        uses: ./.github/release-actions/build-pack-sign
        with:
          version: ${{ inputs.version }}

      - name: Publish prerelease to npmjs
        if: steps.detect.outputs.is_prerelease == 'true'
        env:
          DIST_TAG: ${{ steps.detect.outputs.dist_tag }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npm publish --access public --provenance --tag "$DIST_TAG" --dry-run
          else
            npm publish --access public --provenance --tag "$DIST_TAG"
          fi

      - name: Create prerelease GitHub Release
        if: steps.detect.outputs.is_prerelease == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$INPUT_VERSION" \
            --title "v$INPUT_VERSION" \
            --prerelease \
            --generate-notes \
            "owasp-aghast-aghast-${INPUT_VERSION}.tgz" \
            "owasp-aghast-aghast-${INPUT_VERSION}.tgz.sigstore"

  # ────────────────────────────────────────────────────────────────────────
  # PUBLISH-STABLE — gated by the `release` GitHub Environment. GitHub pauses
  # this job before its first step until a required reviewer approves the
  # deployment ("Review deployments" on the run). Everything privileged lives
  # past that gate. Publishing happens BEFORE the PR merge so a failed publish
  # never leaves main bumped ahead of the registry.
  #
  # Prereleases never reach this job (guarded below) — they publish, un-gated,
  # from the prepare job above.
  # ────────────────────────────────────────────────────────────────────────
  publish-stable:
    needs: prepare
    if: needs.prepare.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm Trusted Publishing (OIDC)

    steps:
      # The bump PR's head SHA was produced by our own prepare job, so it needs
      # no fork/author trust checks — it is not an externally-triggered event.
      # We pin the exact SHA (not the branch tip) and re-verify below.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          token: ${{ secrets.RELEASE_PAT }}

      - name: Verify checked-out release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CHECKED_OUT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CHECKED_OUT_VERSION" != "$VERSION" ]; then
            echo "::error::Checked-out package version $CHECKED_OUT_VERSION does not match release version $VERSION"
            exit 1
          fi

      - name: Re-verify the bump PR's required checks are green
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
        run: |
          # Backstop: prepare already blocked on green, but a check could have
          # been re-run and failed while the deployment awaited approval.
          STATES=$(gh pr checks "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --required --json state --jq '[.[] | .state] | join(",")' 2>/dev/null || echo "")
          if [ -z "$STATES" ] || echo "$STATES" | grep -qvE '^(SUCCESS|SKIPPED)(,(SUCCESS|SKIPPED))*$'; then
            echo "::error::Required checks on bump PR #$PR_NUMBER are not all green (states: $STATES). Refusing to publish."
            exit 1
          fi

      - name: Verify stable tag is available
        if: inputs.dry_run != true
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists on the remote"
            exit 1
          fi

      - name: Build, pack, and sign stable release
        uses: ./.github/release-actions/build-pack-sign
        with:
          version: ${{ inputs.version }}

      - name: Check whether stable version is already published
        id: registry
        if: inputs.dry_run != true
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if npm view "@owasp-aghast/aghast@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish stable release to npmjs
        if: inputs.dry_run != true && steps.registry.outputs.published == 'false'
        run: npm publish --access public --provenance

      - name: Dry-run stable release publication
        if: inputs.dry_run == true
        run: npm publish --access public --provenance --dry-run

      # Real run only: publish succeeded, so now advance main and record the tag.
      - name: Merge published release PR
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch

      - name: Tag merged stable release
        if: inputs.dry_run != true
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch origin main --depth=1
          git checkout --detach origin/main
          if [ "$(node -p "require('./package.json').version")" != "$VERSION" ]; then
            echo "::error::Merged main does not contain version $VERSION."
            exit 1
          fi
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create stable GitHub Release
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            "owasp-aghast-aghast-${VERSION}.tgz" \
            "owasp-aghast-aghast-${VERSION}.tgz.sigstore"

      # Dry run leaves nothing behind: close the PR and delete its branch so the
      # next dry run of the same version starts clean. Uses REST (not `gh pr
      # close`, which needs GraphQL unavailable to this workflow token).
      - name: Clean up dry-run release PR and branch
        if: inputs.dry_run == true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
        run: |
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" -f state=closed
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH"
