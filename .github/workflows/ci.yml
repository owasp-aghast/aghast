name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'
  pull_request:
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGRESSION_TEST_MODEL: opencode/nemotron-3-ultra-free

permissions:
  contents: read

jobs:
  # Skip CI when it would be redundant:
  #   Push:  merged PR whose checks already passed (safe because branch protection
  #          requires PRs to be up-to-date with main before merging).
  #          Direct pushes that only touch .md files also skip when the last CI
  #          run on the branch passed.
  #   PR:    only .md files changed AND the last CI run on the base branch passed.
  check-ci-skip:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    permissions:
      contents: read
      checks: read
      pull-requests: read
      actions: read
    steps:
      - name: Check if CI should be skipped
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # ── Pull-request path ────────────────────────────────────────────
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"

            NON_MD=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json files \
              --jq '[.files[].path | select(test("\\.md$") | not)] | length')
            TOTAL=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json files \
              --jq '.files | length')

            if [ "$NON_MD" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
              echo "PR #$PR_NUM only changes markdown files ($TOTAL file(s)) — checking base branch CI"
              BASE_REF="${{ github.base_ref }}"
              LAST=$(gh run list --repo "$GH_REPO" --workflow=ci.yml \
                --branch="$BASE_REF" --limit=1 \
                --json conclusion --jq '.[0].conclusion // "none"')
              if [ "$LAST" = "success" ]; then
                echo "Last CI run on $BASE_REF passed — skipping CI"
                echo "skip=true" >> "$GITHUB_OUTPUT"
              else
                echo "Last CI run on $BASE_REF: $LAST — running CI"
                echo "skip=false" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "PR #$PR_NUM has $NON_MD non-markdown change(s) — running CI"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # ── Push path ────────────────────────────────────────────────────
          # Find the merged PR that produced this commit.  Query the commit
          # association directly: `gh pr list` defaults to 30 results, so it
          # can miss a PR that has been open for a while before merging.
          PR_NUM=$(gh api "repos/$GH_REPO/commits/$COMMIT_SHA/pulls" \
            --jq '.[] | select(.merged_at != null) | .number')

          if [ -z "$PR_NUM" ]; then
            # Direct push: skip if only markdown files changed and last CI run passed
            NON_MD=$(gh api "repos/$GH_REPO/commits/$COMMIT_SHA" \
              --jq '[.files[].filename | select(test("\\.md$") | not)] | length' \
              2>/dev/null || echo "1")
            if [ "$NON_MD" = "0" ]; then
              BRANCH="${{ github.ref_name }}"
              LAST=$(gh run list --repo "$GH_REPO" --workflow=ci.yml \
                --branch="$BRANCH" --limit=5 \
                --json conclusion,headSha \
                --jq "[.[] | select(.headSha != \"$COMMIT_SHA\")] | .[0].conclusion // \"none\"")
              if [ "$LAST" = "success" ]; then
                echo "Direct push with only markdown changes, last CI passed — skipping"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            echo "No merged PR found for $COMMIT_SHA (direct push?) — running CI"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found merged PR #$PR_NUM for commit $COMMIT_SHA"

          # Check if all CI checks passed on the PR (exclude this workflow's own checks)
          FAILED=$(gh pr checks "$PR_NUM" --json name,state \
            --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')

          if [ "$FAILED" -eq 0 ]; then
            echo "All checks passed on PR #$PR_NUM — skipping redundant CI"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$FAILED check(s) did not pass on PR #$PR_NUM — running CI"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

  test:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        shard: [1, 2, 3, 4]
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests (shard ${{ matrix.shard }}/3)
        shell: bash
        run: |
          # Shard 1: cli-mock-mode-2 (~35s CI, env-var tests)
          # Shard 2: cli-mock-mode (~40s CI, CLI integration tests)
          # Shard 3: cli-subcommands + everything else (~30s CI)
          # Shard 4: fuzz tests (~47s Windows, ~16s macOS)
          # New test files land in shard 3 automatically.
          case $SHARD in
            1) files=(tests/cli-mock-mode-2.test.ts) ;;
            2) files=(tests/cli-mock-mode.test.ts) ;;
            3)
              all=($(printf '%s\n' tests/*.test.ts | sort))
              heavy=(tests/cli-mock-mode-2.test.ts tests/cli-mock-mode.test.ts tests/fuzz.test.ts)
              files=()
              for f in "${all[@]}"; do
                skip=false
                for h in "${heavy[@]}"; do
                  if [[ "$f" == "$h" ]]; then skip=true; break; fi
                done
                if [[ "$skip" == "false" ]]; then files+=("$f"); fi
              done
              ;;
            4) files=(tests/fuzz.test.ts) ;;
          esac
          echo "Shard $SHARD/4: running ${#files[@]} test files"
          printf '  %s\n' "${files[@]}"
          node --import tsx --test \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=test-results.xml \
            "${files[@]}"
        env:
          AGHAST_SKIP_SEMGREP_TESTS: 'true'
          AGHAST_SKIP_OPENGREP_TESTS: 'true'
          SHARD: ${{ matrix.shard }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}-shard-${{ matrix.shard }}
          path: test-results.xml

  test-gate:
    runs-on: ubuntu-latest
    needs: [check-ci-skip, test]
    if: always()
    steps:
      - name: Check test matrix result
        env:
          TEST_RESULT: ${{ needs.test.result }}
          CI_SKIP: ${{ needs.check-ci-skip.outputs.skip }}
        run: |
          if [ "$CI_SKIP" = "true" ]; then
            echo "CI skipped — PR checks already passed"
            exit 0
          fi
          if [ "$TEST_RESULT" != "success" ]; then
            echo "Test matrix failed: $TEST_RESULT"
            exit 1
          fi

  build-and-install-gate:
    runs-on: ubuntu-latest
    needs: [check-ci-skip, build-and-install]
    if: always()
    steps:
      - name: Check build-and-install matrix result
        env:
          BUILD_RESULT: ${{ needs.build-and-install.result }}
          CI_SKIP: ${{ needs.check-ci-skip.outputs.skip }}
        run: |
          if [ "$CI_SKIP" = "true" ]; then
            echo "CI skipped — PR checks already passed"
            exit 0
          fi
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "Build-and-install matrix failed: $BUILD_RESULT"
            exit 1
          fi

  # Aggregates the integration & regression suites into a single required check.
  # Marked required in branch protection so auto-merge waits for these (slower,
  # previously non-blocking) jobs instead of merging the moment lint/test/build
  # pass — which left them still running and defeated the post-merge CI skip.
  integration-gate:
    runs-on: ubuntu-latest
    needs: [check-ci-skip, semgrep-integration, openant-integration, opencode-integration, regression-test-semgrep]
    if: always()
    steps:
      - name: Check integration & regression results
        env:
          CI_SKIP: ${{ needs.check-ci-skip.outputs.skip }}
          SEMGREP_RESULT: ${{ needs.semgrep-integration.result }}
          OPENANT_RESULT: ${{ needs.openant-integration.result }}
          OPENCODE_RESULT: ${{ needs.opencode-integration.result }}
          REGRESSION_RESULT: ${{ needs.regression-test-semgrep.result }}
        run: |
          if [ "$CI_SKIP" = "true" ]; then
            echo "CI skipped — PR checks already passed"
            exit 0
          fi
          status=0
          for entry in \
            "semgrep-integration:$SEMGREP_RESULT" \
            "openant-integration:$OPENANT_RESULT" \
            "opencode-integration:$OPENCODE_RESULT" \
            "regression-test-semgrep:$REGRESSION_RESULT"; do
            name="${entry%%:*}"
            result="${entry#*:}"
            # 'success' and 'skipped' are acceptable; 'failure'/'cancelled' are not
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name did not pass: $result"
              status=1
            fi
          done
          exit $status

  test-results:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    needs: [check-ci-skip, test]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')

    steps:
      - name: Download all test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test-results-*

      - name: Publish test results
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        with:
          report_paths: '**/test-results.xml'
          check_name: Test Results
          include_passed: true

  semgrep-integration:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Single Node version per OS: Semgrep + SARIF parsing is not
        # Node-version-sensitive; version coverage comes from test shards.
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: echo "semgrep==1.161.0" > requirements.txt

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Semgrep
        run: pip install -r requirements.txt

      - name: Run Semgrep integration tests
        run: npm run test:semgrep

  opengrep-integration:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the semgrep-integration matrix: public repo tests 3 OSes, internal tests ubuntu only.
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Opengrep (Linux / macOS)
        # The upstream install.sh calls the unauthenticated GitHub API to list releases
        # (https://github.com/opengrep/opengrep#quick-install-recommended) and hits shared-IP rate
        # limits on CI runners. We bypass it with `gh release download` (authenticated via GH_TOKEN).
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  ASSET="opengrep_manylinux_x86" ;;
            Linux-aarch64) ASSET="opengrep_manylinux_aarch64" ;;
            Darwin-x86_64) ASSET="opengrep_osx_x86" ;;
            Darwin-arm64)  ASSET="opengrep_osx_arm64" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac

          VERSION=$(gh release view --repo opengrep/opengrep --json tagName --jq .tagName)
          INST="$HOME/.opengrep/cli/$VERSION"
          mkdir -p "$INST"

          gh release download "$VERSION" --repo opengrep/opengrep --pattern "$ASSET" --output "$INST/opengrep"
          chmod +x "$INST/opengrep"

          LATEST="$HOME/.opengrep/cli/latest"
          rm -f "$LATEST"
          ln -s "$INST" "$LATEST"

          echo "$LATEST" >> "$GITHUB_PATH"

      - name: Install Opengrep (Windows)
        # Same rationale as above: upstream install.ps1 hits the unauthenticated GitHub API.
        # Use `gh release download` authenticated via GH_TOKEN, and a directory junction
        # (no admin required) for the 'latest' pointer.
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $asset = 'opengrep_windows_x86.exe'
          $version = gh release view --repo opengrep/opengrep --json tagName --jq .tagName
          $inst = Join-Path $env:USERPROFILE ".opengrep\cli\$version"
          New-Item -ItemType Directory -Force -Path $inst | Out-Null

          gh release download $version --repo opengrep/opengrep --pattern $asset --output (Join-Path $inst 'opengrep.exe')

          $latest = Join-Path $env:USERPROFILE ".opengrep\cli\latest"
          if (Test-Path $latest) { Remove-Item -Recurse -Force $latest }
          New-Item -ItemType Junction -Path $latest -Target $inst | Out-Null

          Add-Content -Path $env:GITHUB_PATH -Value $latest

      - name: Verify Opengrep is on PATH
        run: opengrep --version

      - name: Run Opengrep integration tests
        run: npm run test:opengrep

  openant-integration:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Build OpenAnt (Unix)
        if: runner.os != 'Windows'
        run: |
          git clone https://github.com/knostic/OpenAnt.git /tmp/openant
          cd /tmp/openant/apps/openant-cli
          go build -o bin/openant ./main.go
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Build OpenAnt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/knostic/OpenAnt.git $env:RUNNER_TEMP\openant
          Set-Location $env:RUNNER_TEMP\openant\apps\openant-cli
          go build -o bin\openant.exe .\main.go
          "$PWD\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run OpenAnt integration tests
        run: npm run test:openant

  opencode-integration:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install OpenCode CLI
        shell: bash
        run: |
          npm ci --prefix .github/opencode-install
          echo "$GITHUB_WORKSPACE/.github/opencode-install/node_modules/.bin" >> $GITHUB_PATH

      - name: Run OpenCode integration tests (with retry)
        run: npm run test:opencode || npm run test:opencode || npm run test:opencode
        timeout-minutes: 10

  regression-test-sarif:
    needs: [check-ci-skip]
    if: false  # temporarily disabled: unreliable and slow
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install OpenCode CLI
        shell: bash
        run: |
          npm ci --prefix .github/opencode-install
          echo "$GITHUB_WORKSPACE/.github/opencode-install/node_modules/.bin" >> $GITHUB_PATH

      - name: Clone public checks repo
        run: git clone --depth=1 https://github.com/BounceSecurity/aghast-bounce-checks-public.git checks-config-public

      - name: Run regression test (test-9, SARIF false-positive validation, with retry)
        run: |
          npx tsx checks-config-public/scripts/regression-test.ts --codebase test-9-sast-false-positives --agent-provider opencode --model ${{ env.REGRESSION_TEST_MODEL }} ||
          npx tsx checks-config-public/scripts/regression-test.ts --codebase test-9-sast-false-positives --agent-provider opencode --model ${{ env.REGRESSION_TEST_MODEL }} ||
          npx tsx checks-config-public/scripts/regression-test.ts --codebase test-9-sast-false-positives --agent-provider opencode --model ${{ env.REGRESSION_TEST_MODEL }}
        timeout-minutes: 20

  regression-test-semgrep:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install OpenCode CLI
        shell: bash
        run: |
          npm ci --prefix .github/opencode-install
          echo "$GITHUB_WORKSPACE/.github/opencode-install/node_modules/.bin" >> $GITHUB_PATH

      - run: echo "semgrep==1.161.0" > requirements.txt

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Semgrep
        run: pip install -r requirements.txt

      - name: Clone public checks repo
        run: git clone --depth=1 https://github.com/BounceSecurity/aghast-bounce-checks-public.git checks-config-public

      - name: Run regression test (test-2, targeted Semgrep+AI, with retry)
        run: |
          npx tsx checks-config-public/scripts/regression-test.ts --codebase test-2-importantvalidations-easy --agent-provider opencode --model ${{ env.REGRESSION_TEST_MODEL }} ||
          npx tsx checks-config-public/scripts/regression-test.ts --codebase test-2-importantvalidations-easy --agent-provider opencode --model ${{ env.REGRESSION_TEST_MODEL }} ||
          npx tsx checks-config-public/scripts/regression-test.ts --codebase test-2-importantvalidations-easy --agent-provider opencode --model ${{ env.REGRESSION_TEST_MODEL }}
        timeout-minutes: 20

  build-and-install:
    needs: [check-ci-skip]
    if: always() && (needs.check-ci-skip.result == 'skipped' || needs.check-ci-skip.outputs.skip != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: aghast-install

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build and pack
        working-directory: aghast-install
        run: |
          npm ci
          npm run build
          npm pack

      - name: Install from tarball
        shell: bash
        run: npm install -g ./aghast-install/owasp-aghast-aghast-*.tgz

      - name: Verify CLI works
        run: |
          aghast --version
          aghast --help

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low
